services:
  pocket-tts:
    build: .
    expose:
      - "8000"
    volumes:
      - pocket_tts_cache:/root/.cache/pocket_tts
      - hf_cache:/root/.cache/huggingface
    command: ["serve", "--host", "0.0.0.0"]
    restart: unless-stopped
    networks:
      - coolify

volumes:
  pocket_tts_cache:
  hf_cache:

networks:
  coolify:
    external: true
    name: coolify
